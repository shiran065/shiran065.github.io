                <p>PHP语法初步 </p>
<p>PHP是一种后端脚本语言，专门用来做网页后台开发。</p>
<p>PHP代码标记<br>ASP标记:&lt;% php代码 %&gt;<br>短标记:<? php代码 ?><br>脚本标记:<script language="php">php代码</script<br>标准标记(常用):<?php php 代码?><br>(前面两种基本弃用)</p>
<p>PHP注释<br>PHP 中注释分为两种：行注释和块注释<br>行注释：一次注释一行<br>//：后面跟的所有内容都是注释<br>#：与 // 一样<br>块注释：一次注释多行<br>/：中间直到*/ 出现之前，全部都是注释</p>
<p>PHP语句分隔符<br>语句分隔符：在 PHP 中，代码是以行为单位，系统需要通过判断行的结束，该结束通常都是一个符号：分号 “;”（英文状态下的分号）</p>
<p>PHP 中标记结束符?>有自带语句结束符的效果，最后一行 PHP 代码可以没有语句结束符";"但是不建议这样做<br>PHP 中其实很多代码的书写并不是嵌入到 HTML 中，而是单独存在，通常书写习惯中就不建议使用标记结束符?>，<br>建议不用标记结束符,这样 PHP 就会自动将从开始到最后全部认为是 PHP 代码，从而解析。</p>
<p>变量<br>1.变量是用来存储数据的；<br>2.变量是存在名字的；<br>3.变量是通过名字来访问的数据；<br>4.变量是可以改变的数据。</p>
<p>变量的使用<br>PHP 中的所有变量都必须使用 $ 符号。<br>定义：在系统中增加对应的变量名字（内存）；<br>赋值：可以将数据赋值给变量名（可以在定义的同时完成）；<br>可以通过变量名访问存储的数据；<br>可以将变量从内存中删除（使用 unset(变量名)）。<br>示例·<br>$var2 = 2;<br>echo '<hr/>', $var2;<br>unset($var2);<br>echo $var2;</p>
<p>预定义变量<br>预定义变量：提前定义的变量，系统定义的变量，存储许多需要用到的数据（预定义变量都是数组）<br>$_GET：获取所有表单以 get 方式提交的数据<br>$_POST：POST 提交的数据都会保存在此<br>$_REQUEST：GET 和 POST 提交的都会保存<br>$GLOBALS：PHP 中所有的全局变量<br>$_SERVER：服务器信息<br>$_SESSION：session 会话数据<br>$_COOKIE：cookie 会话数据<br>$_ENV：环境信息<br>$_FILES：用户上传的文件信息</p>
<p>可变变量<br>可变变量：如果一个变量保存的值刚好是另外一个变量的名字，那么可以直接通过访问一个变量得到另外一个变量的值：在变量前面再多加一个$符号。<br>$a = 'b';<br>$b = 'bb';<br>$$a => bb</p>
<p>变量传值<br>将一个变量赋值给另外一个变量：变量传值。<br>变量传值一共有两种方式：值传递，引用传递。<br>值传递：将变量保存的值赋值一份，然后将新的值给另外一个变量保存（两个变量没有关系）。<br>引用传递：将变量保存的值所在的内存地址，传递给另外一个变量：两个变量指向同一块内存空间（两个变量是同一个值）。<br>在内存中，通常有以下几个分区：<br>栈区：程序可以操作的内存部分（不存数据，运行程序代码），少但是快。<br>代码段：存储程序的内存部分（不执行）。<br>数据段：存储普通数据（全局区和静态区）。<br>堆区：存储复杂数据，大但是效率低。</p>
<p>常量<br>常量基本概念<br>常量与变量一样，都是用来保存数据的。<br>常量：const/constant，是一种在程序运行当中，不可改变的量（数据）。常量一旦定义，通常数据不可改变（用户级别）<br>// 使用函数定义常量：define<br>define('PI', 3.14);<br>// 使用const关键字定义<br>const PII = 3;</p>
<p>常量名字的命名规则<br>1.常量不需要使用 $ 符号，一旦使用系统就会认为是变量；<br>2.常量的名字组成由字母、数字和下划线组成，不能以数字开头；<br>3.常量的名字通常是以大写字母为主（与变量以示区别）；<br>4.常量命名的规则比变量要松散，可以使用一些特殊字符，该方式只能使用 define 定义。</p>
<p>系统常量<br>系统常量：系统帮助用户定义的常量，用户可直接使用。</p>
<p>常用系统常量<br>PHP_VERSION：PHP 版本号<br>PHP_INT_SIZE：整型大小（整型占用的字节数）<br>PHP_INT_MAX：整型能表示的最大值（PHP 整型为带符号，含负数）</p>
<p>特殊符号命名的常量不能直接用echo输出，需通过constant('常量名')调用，示例：echo constant('-');<br>系统魔术常量（双下划线开头 + 双下划线结尾，值随环境变化，用户不可改）：<br>__DIR__：当前被执行脚本所在电脑的绝对路径<br>__FILE__：当前被执行脚本所在电脑的绝对路径（含自身文件名）<br>__LINE__：当前所属的行数<br>__NAMESPACE__：当前所属的命名空间<br>__CLASS__：当前所属的类<br>__METHOD__：当前所属的方法</p>
<p>数据类型<br>在 PHP 中指的是存储的数据本身的类型，而不是变量的类型。PHP 是一种弱类型语言，变量本身没有数据类型。<br>PHP 的八种数据类型<br>PHP 中将数据分为三大类八小类。<br>简单（基本）数据类型：4 个小类<br>1.整型：int/integer，系统分配 4 个字节存储，表示整数类型（有前提）。<br>2.浮点型：float/double，系统分配 8 个字节存储，表示小数或者整型存不下的整数。<br>3.字符串型：string，系统根据实际长度分配，表示字符串（引号）。<br>4.布尔类型：bool/boolean，表示布尔类型，只有两个值：true 和 false。<br>复合数据类型：2 个小类<br>1.对象类型：object，存放对象（面向对象）。<br>2.数组类型：array，存储多个数据（一次性）。<br>特殊数据类型：2 个小类<br>1.资源类型：resource，存放资源数据（PHP 外部数据，如数据库、文件）。<br>2.空类型：NULL，只有一个值就是 NULL（不能运算）。</p>
<p>类型转换<br>类型转换：在很多的条件下，需要指定的数据类型，需要外部数据 (当前 PHP 取得的数据), 转换成目标数据类型<br>在 PHP 中有两种类型转换方式:<br>1、自动转换：系统根据需求自己判定，自己转换 (用的比较多，效率偏低)<br>2、强制 (手动) 转换：认为根据需要的目标类型转换在转换过程中，用的比较多的就是转布尔类型 (判断) 和转数值类型 (算术运算)<br>其他类型转布尔类型:true 或者 false, 在 PHP 中比较少类型转成 false<br>其他类型转数值的说明<br>1、 布尔 true 为 1,false 为 0;<br>2、 字符串转数值有自己的规则<br>2.1 以字母开头的字符串，永远为 0;<br>2.2 以数字开头的字符串，取到碰到字符串为止 (不会同时包含两个小数点)</p>
<p>在进行某些数据判断的时候，需要特别注意类型转换<br>Empty()：判断数据的值是否为 “空”，不是 NULL，如果为空返回 true，不为空返回 false<br>Isset()：判断数据存储的变量本身是否存在，存在变量返回 true，不存在返回 false</p>
<p>运算符<br>比较运算符<br>===:大小和类型都相同<br>!==:只有大小或类型不相同</p>
<p>连接运算符<br>连接运算：是PHP中将多个字符串拼接的一种符号<br>.：将两个字符串连接到一起<br>.=：复合运算，将左边的内容与右边的内容连接起来，然后重新赋值给左边变量<br>A .= b ==== A = A . b</p>
<p>错误抑制符<br>在PHP中有一些错误可以提前预知，但是这些错误可能无法避免，但是又比希望报错给用户看，可以使用错误抑制符处理。<br>@：在可能出错的表达式前面使用@符号即可</p>
<p>三木运算符<br>//三木运算符<br>echo '<hr/>';<br>$a = 10;<br>$b = $a > 10 ? 100 : 0;<br>echo $b;</p>
<p>三木运算可以进行复合三木运算：三木运算中的表达式2和3都是可以是另外一个三目运算。<br>表达式1 ? (表达式2 ? 表达式4 : 表达式5) : (表达式3 ? 表达式5 : 表达式6);</p>
<p>计算机码<br>计算机码：原码、反码和补码，数值本身最左边一位是用来充当符号位：正数为 0，负数为 1<br>原码：数据本身从十进制转换成二进制得到的结果  <br>正数：左边符号位为 0（正数的原码、反码和补码就是原码本身）  <br>负数：左边符号位为 1<br>反码：针对负数，符号位不变，其他位取反<br>补码：针对负数，反码 + 1<br>系统中存在两个 0：+0 和 - 0<br>+0： 00000000<br>-0： 10000000 (原码)<br>取反 11111111<br>补码 00000000</p>
<p>位运算符<br>位运算：取出计算机中最小的单位（位 bit）进行运算<br>&：按位与，两个位都为 1，结果为 1，否则为 0<br>|：按位或，两个有一个为 1，结果为 1<br>~：按位非，一个位如果为 1 则变成 0，否则反之<br>^：按位异或，两个相同则为 0，不同则为 1<br><<：按位左移，整个位（32 位），向左移动一位，右边补 0</p>
<blockquote>
<blockquote>
<p>：按位右移，整个位向右移动一位，左边补符号位对应内容（正数补 0，负数补 1）</p>
</blockquote>
</blockquote>
<p>流程控制<br>1.顺序结构<br>2.分支结构<br>if 分支<br>switch分支<br>Switch (条件表达式){<br>// 所有条件判断：逐个进行<br>Case 值 1: // 当前条件表达式的结果与值 1 相等（==）<br>要执行的代码段；<br>Break; // 在 switch 中，如果条件匹配成功，那么系统就不会再次匹配条件，会自动顺序执行向下的所有代码（case 代码除外），需要中断执行：break 表示中断 switch（结束）。<br>Case 值 2:<br>要执行的代码段；<br>Break;<br>// 可以使用类似 else 的语法：都不匹配<br>Default:<br>// 匹配失败的代码；<br>Break;<br>}<br>3.循环结构<br>for循环 while循环 do-while循环<br>循环控制：<br>1.中断控制:continue<br>2.终止控制:break</p>
<p>替代语法<br>PHP提供了分支结构和循环结构的替代语法</p>
<p>文件加载<br>include<br>引入文件，找不到文件只报错警告，程序继续往下执行<br>require<br>引入文件，找不到文件直接致命错误，程序立刻停止<br>include_once<br>和 include 一样，同一个文件只会加载 1 次，重复引入不会重复执行<br>require_once<br>和 require 一样，同一个文件只会加载 1 次，防止重复定义函数、常量报错</p>
<p>文件加载原理<br>1、在文件加载（include 或者 require）的时候，系统会自动的将被包含文件中的代码嵌入到当前文件中<br>2、加载位置：在哪加载，对应的文件中的代码嵌入的位置就是对应的 include 位置<br>3、在 PHP 中被包含的文件是单独进行编译的PHP 文件在编译的过程中如果出现了语法错误，那么会失败（不会执行）；但是如果被包含文件有错误的时候，系统会在执行到包含 include 这条语句的时候才会报错</p>
<p>文件加载路径<br>1.绝对路径<br>从磁盘的根目录开始（本地绝对路径）<br>Windows：盘符 C:/ 路径 / PHP 文件<br>Linux：/ 路径 / PHP 文件<br>从网站根目录开始（网络绝对路径）<br>/：相对于网站主机名字对应的路径<br>localhost/index.php -> E:/server/apache/htdocs/index.php<br>2.相对路径：从当前文件所在目录开始的路径<br>./：表示当前文件夹<br>../：上级目录（当前文件夹的上一层文件夹）<br>绝对路径和相对路径的加载区别<br>1、绝对路径相对效率偏低，但是相对安全（路径不会出问题）<br>2、相对路径相对效率高些，但是容易出错（相对路径会发生改变）</p>
<p>文件嵌套包涵</p>
<p>函数<br>函数：function，是一种语法结构，将实现某一个功能的代码块（多行代码）封装到一个结构中，<br>从而实现代码的重复利用（复用）。<br>函数定义语法<br>函数有几个对应的关键点：function 关键字、函数名、参数（形参和实参）、函数体和返回值<br>function 函数名(参数){<br>    //函数体<br>    //返回值：return 结果;<br>}</p>
<p>定义函数的目的：是为了实现代码的重复利用，一个功能对应一个函数</p>
<p>函数体<br>数内部（大括号 {} 里面）的所有代码都称之为函数体<br>函数体基本上可以实现所有的代码</p>
<p>函数返回值<br>返回值：return，指的是将函数实现的结果，通过 return 关键字，返回给函数外部（函数调用处）；在 PHP 中所有的函数都有返回值。（如果没有明确 return 使用，那么系统默认返回 NULL）</p>
<p>作用域<br>作用域：变量（常量）能够被访问的区域<br>1、变量可以在普通代码中定义<br>2、变量也可以在函数内部定义<br>在 PHP 中作用域严格来说分为两种：但是 PHP 内部还定义一些在严格意义之外的一种，所以总共算三种：<br>1、全局变量：就是用户普通定义的变量（函数外部定义）所属全局空间：在 PHP 中只允许在全局空间使用；理论上函数内部不可方法脚本周期：直到脚本运行结束（最后一行代码执行完）<br>2、局部变量：就是在函数内部定义的变量所属当前函数空间：在 PHP 中只允许在当前函数自己内部使用函数周期：函数执行结束（函数是在线区中开辟独立内存空间运行）<br>3、超全局变量：系统定义的变量</p>
<p>global 访问全局变量语法<br>function 函数名(){<br>    global $全局变量名;<br>    // 函数内就可以正常使用全局变量了<br>}</p>
<p>可变函数<br>可变函数：当前有一个变量所保存的值，刚好是一个函数的名字，那么就可以使用变量()来充当函数名使用。</p>
<p>$变量 = 'display';<br>function display() {</p>
<p>}</p>
<p>匿名函数<br>变量名 = function(){<br>    函数体<br>};</p>
<p>常用系统函数<br>1.有关输出的函数<br>print ()：类似于 echo 输出提供的内容，本质是一种结构（不是函数），返回 1，可以不需要使用括号<br>print_r ()：类似于 var_dump，但是比 var_dump 简单，不会输出数据的类型，只会输出值（数组打印使用比较多）</p>
<p>2.有关时间的函数<br>data()<br>time()<br>microtime():获取微妙级时间</p>
<p>3.有关数学的函数<br>max()：指定参数中最大的值<br>min()：比较两个数中较小的值<br>rand()：得到一个随机数，指定区间的随机整数<br>mt_rand()：与 rand 用法一致，底层结构不同，效率比 rand 更高（推荐使用）<br>round()：四舍五入<br>ceil()：向上取整<br>floor()：向下取整<br>sqrt()：求平方根<br>pow()：求指定数字的指定指数次结果<br>例：pow(2,8) == 2^8 == 256<br>abs()：绝对值</p>
<p>有关函数的函数<br>function_exists()：判断指定的函数名字是否在内存中存在，帮助用户不去使用一个不存在的函数，让代码安全性更高<br>func_get_arg()：在自定义函数中去获取指定数值对应的参数<br>func_get_args()：在自定义函数中获取所有的参数（数组）<br>func_num_args()：获取当前自定义函数的参数数量</p>
<p>错误处理<br>错误处理：指的是系统（或者用户）在对某些代码进行执行的时候，发现有错误，就会通过错误处理的形式告知程序员。</p>
<p>错误分类<br>语法错误：用户书写的代码不符合 PHP 的语法规范，语法错误会导致代码在编译过程中不通过，所以代码不会执行（Parse error）<br>运行时错误：代码编译通过，但是代码在执行的过程中会出现一些条件不满足导致的错误（runtime error）<br>逻辑错误：程序员在写代码的时候不够规范，出现了一些逻辑性的错误，导致代码正常执行，但是得不到想要的结果</p>
<p>错误代号<br>所有看到的错误代码在 PHP 中都被定义成了系统常量（可以直接使用）<br>系统错误：<br>E-PARSE：编译错误，代码不会执行<br>E-ERROR：fatal error，致命错误，会导致代码不能正确继续执行（出错的位置断掉）<br>E-WARNING：warning，警告错误，不会影响代码执行，但是可能得到意想不到的结果<br>E-NOTICE：notice，通知错误，不会影响代码执行<br>用户错误：E_USER_ERROR、E_USER_WARNING、E_USER_NOTICE<br>用户在使用自定义错误触发的时候，会使用到的错误代号（系统不会用到）<br>其他：E-ALL，代表着所有错误（通常在进行错误控制的时候使用比较多），建议在开发过程中（开发环境）使用</p>
<p>错误控制的位运算说明<br>所有以 E 开头的错误常量（代号）其实都是由一个字节存储，每一种错误占据一个对应的位，如果想进行一些错误的控制，可以使用位运算进行操作：<br>排除通知级别 notice：E-ALL & ~E-NOTICE<br>只要警告和通知：E-WARNING | E-NOTICE</p>
<p>错误显示设置<br>错误显示设置的核心是：控制哪些错误该显示，以及该如何显示。<br>在 PHP 中，有两种方式设置当前脚本的错误处理：</p>
<ol>
<li>全局配置：php.ini 文件<br>display_errors：是否在页面上显示错误<br>error_reporting：设置要显示的错误级别</li>
<li>脚本内配置（优先级高于 php.ini，开发中常用）<br>error_reporting()：设置当前脚本的错误显示级别<br>ini_set('配置项', 配置值)：临时修改配置项的值，示例：<br>ini_set('error_reporting', E_ALL); // 显示所有错误<br>ini_set('display_errors', 1);      // 开启错误显示</li>
</ol>
<p>错误日志设置<br>在生产环境中，不会直接向用户展示错误：<br>对用户体验不友好<br>存在安全风险（错误信息会暴露网站路径、文件名等敏感信息）<br>因此生产环境通常关闭错误显示，将错误信息保存到日志文件中，供后台开发人员排查问题。可以在 php.ini 或脚本中通过 ini_set() 配置日志相关选项。</p>
<p>自定义错误处理<br>基础错误触发：trigger_error() 函数（仅触发错误，不会阻止系统默认报错）<br>自定义错误处理机制：用户可以定义自己的错误处理函数，并将其注册到 PHP 的错误处理句柄中。当系统遇到错误时，会自动调用用户定义的函数进行处理。</p>
<p>字符串类型</p>
<ol>
<li>字符串定义语法<br>单引号字符串：使用单引号包裹<br>双引号字符串：使用双引号包裹<br>nowdoc 字符串：“没有单引号的单引号字符串”，语法示例：<br>$str = <<<'边界符'<br>字符串内容<br>边界符;</li>
</ol>
<p>heredoc 字符串：“没有双引号的双引号字符串”，语法示例：<br>$str = <<<边界符<br>字符串内容<br>边界符;</p>
<ol start="2">
<li><p>结构化字符串（nowdoc/heredoc）定义规则<br>边界符规则：<br>上边界符后面不能跟任何内容<br>下边界符必须顶格（写在最左边）<br>下边界符后面只能跟分号，不能跟其他内容<br>边界符之间的所有内容，都是字符串本身。</p>
</li>
<li><p>字符串转义<br>转义的含义：通过反斜杠 \ + 特定字符，实现系统特殊处理。PHP 中常用转义符号：<br>&#39;：在单引号字符串中显示单引号<br>&quot;：在双引号字符串中显示双引号<br>\r：回车（回到当前行的行首）<br>\n：换行<br>\t：制表符（类似 Tab 键，输出 4 个空格）<br>$：输出 PHP 中的变量符号 $（避免被解析为变量）</p>
</li>
</ol>
<p>字符串长度问题<br>基础函数：strlen()，以字节为单位，返回字符串的长度。</p>
<p>字符串相关函数<br>1转换类函数<br>implode(连接方式, 数组)：将数组元素按指定规则拼接成字符串<br>explode(分割字符, 目标字符串)：按指定分割字符，将字符串拆分为数组<br>str_split(字符串, 字符长度)：按指定长度拆分字符串，返回数组</p>
<p> 截取 / 去除空白类函数<br>trim(字符串[, 指定字符])：默认去除字符串两端的空格，也可指定要去除的字符（循环去除，直到遇到非目标字符为止，中间内容不受影响）<br>ltrim()：去除字符串左侧的指定字符 / 空格<br>rtrim()：去除字符串右侧的指定字符 / 空格<br>substr(字符串, 起始位置[, 长度])：从指定位置（从 0 开始）截取字符串，可指定长度，不指定则截取到末尾示例：substr('abcdef', 1, 3) → 输出 bcd<br>strstr(字符串, 匹配字符)：从匹配字符首次出现的位置开始，截取到字符串末尾（可用于去除文件后缀名）示例：strstr('abcdef', 'c') → 输出 cdef</p>
<p>大小写转换函数<br>strtolower()：将字符串全部转为小写<br>strtoupper()：将字符串全部转为大写<br>ucfirst()：将字符串首字母转为大写</p>
<p>查找函数<br>strpos()：查找字符在目标字符串中首次出现的位置（从 0 开始计数）<br>示例：strpos('123a234a3b2a', 'a') → 输出 3<br>strrpos()：查找字符在目标字符串中最后出现的位置<br>示例：strrpos('123a234a3b2a', 'a') → 输出 11</p>
<p>替换函数<br>str_replace(匹配目标, 替换内容, 字符串本身)：将目标字符串中匹配的部分替换为指定内容</p>
<p>格式化函数<br>printf(带占位符的字符串, 占位内容...)：格式化输出数据（直接输出结果）<br>sprintf(带占位符的字符串, 占位内容...)：格式化数据并返回字符串（需用变量接收结果）</p>
<p>其他函数<br>str_repeat(字符串, 次数)：将字符串重复指定次数<br>str_shuffle(字符串)：随机打乱字符串的字符顺序</p>
<p>数组基础</p>
<ol>
<li>数组的概念<br>数组（array）是数据的组合，指将一组数据存储到一个容器中，用变量指向该容器，可通过变量一次性获取所有数据。</li>
<li>数组定义语法<br>PHP 中支持多种数组定义方式：<br>array 关键字（最常用）：<br>$变量 = array(元素1, 元素2, 元素3...);</li>
</ol>
<p>中括号简写：<br>$变量 = [元素1, 元素2...];</p>
<p>隐形定义数组：给变量增加中括号，系统自动转为数组<br>不指定下标：$变量[] = 值1; 下标自动从 0 开始生成<br>指定下标：$变量[下标] = 值; 下标可以是数字或字符串，规则与变量命名类似</p>
<p>PHP 数组特点<br>下标类型灵活：<br>索引数组：下标全为整数<br>关联数组：下标全为字符串<br>混合数组：整数下标与字符串下标可混合存在<br>元素顺序与下标无关：数组元素的顺序以放入顺序为准，与下标大小无关<br>数字下标的自增特性：从 0 开始自动增长；若手动指定较大下标，后续自动生成的下标从 “最大下标 + 1” 开始<br>特殊值下标自动转换：布尔值（true/false）、NULL 作为下标时会自动转换<br>无类型与长度限制：数组元素可以是任意类型，数组长度也无限制<br>存储位置：数组数据存储在堆区，系统会为数组分配一块连续的内存</p>
<p>多维数组与异形数组</p>
<ol>
<li>多维数组<br>定义：数组中的元素本身也是数组<br>二维数组：数组中所有元素都是一维数组<br>扩展：PHP 无维度限制，但不建议使用超过三维的数组（会增加访问复杂度、降低效率）</li>
<li>异形数组（不规则数组）<br>定义：数组中的元素不统一，同时包含普通变量和数组<br>开发建议：实际开发中不常用，应尽量让数组元素规则化，方便访问与维护</li>
</ol>
<p>数组遍历基础<br>数组遍历：通过简化规则，自动获取数组下标并依次输出所有元素。示例（二维数组访问）：<br>$arr = array(0=>array('name'=>'Tom'),1=>array('name'=>'Jim'));<br>// 访问一维元素：$arr[一维下标]<br>$arr[0]; // 结果：array('name'=>'Tom');<br>// 访问二维元素：$arr[一维下标][二维下标]<br>$arr[1]['name']; // 结果：Jim</p>
<p>foreach 遍历</p>
<ol>
<li>基本语法<br>foreach($数组变量 as [$下标 =>] $值){<br> // 通过$下标访问元素的下标；通过$值访问元素的值<br>}<br>关联数组（字符串下标）：通常需要指定下标变量<br>索引数组（数字下标）：可直接访问值，省略下标变量<br>2.遍历原理<br>数组内部有一个指针，默认指向第一个元素，foreach 利用指针获取数据并移动指针<br>执行流程：<br>foreach 重置指针，指向数组第一个元素<br>进入循环，通过指针获取当前元素的下标和值，存入对应变量，指针下移<br>执行循环体代码<br>重复步骤 2-3，直到指针指向数组末尾（取不到元素）</li>
</ol>
<p>for 循环遍历数组<br>适用条件：<br>可通过 count($数组) 获取数组长度<br>数组下标为规律的数字（索引数组）<br>核心逻辑：基于已知的起始、结束边界和下标变化规律，循环访问元素</p>
<p>while + each + list 遍历（PHP 7.2 已废弃 each 函数）</p>
<ol>
<li>each() 函数<br>功能：获取数组指针当前指向元素的下标和值，返回包含 4 个元素的数组（指针同时下移）<br>返回数组结构：<br>0 下标：元素的下标值<br>1 下标：元素的值<br>key 下标：元素的下标值<br>value 下标：元素的值</li>
<li>list() 结构<br>功能：批量为变量赋值，从索引数组中依次取值存入对应变量<br>限制：只能从从 0 开始的索引数组中获取数据</li>
</ol>
<p>数组相关函数</p>
<ol>
<li>排序函数（按 ASCII 码比较，支持英文排序）<br>表格<br>函数		功能					下标是否保留<br>sort()		顺序排序				下标重排<br>rsort()	逆序排序				下标重排<br>asort()	顺序排序				下标保留<br>arsort()	逆序排序				下标保留<br>ksort()	按键名（下标）顺序排序	-<br>krsort()	按键名（下标）逆序排序	-<br>shuffle()	随机打乱数组元素		-</li>
</ol>
<p>示例：<br>$arr = array(3,1,5,2,0);<br>sort($arr);<br>print_r($arr); // 输出：Array([0]=>0 [1]=>1 [2]=>2 [3]=>3 [4]=>5)</p>
<ol start="2">
<li>指针函数<br>reset()：重置指针，指向数组第一个元素<br>end()：重置指针，指向数组最后一个元素<br>next()：指针下移，获取下一个元素的值<br>prev()：指针上移，获取上一个元素的值<br>current()：获取当前指针对应的元素值<br>key()：获取当前指针对应的下标值<br>s</li>
<li>其他常用函数<br>count()：统计数组中元素的数量<br>array_push()：在数组末尾添加元素<br>array_pop()：从数组末尾取出元素<br>array_shift()：从数组开头取出元素<br>array_unshift()：在数组开头添加元素<br>array_reverse()：反转数组元素顺序<br>in_array()：判断元素是否存在于数组中<br>array_keys()：获取数组所有下标，返回索引数组<br>array_values()：获取数组所有值，返回索引数组</li>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/tocbot/4.20.1/tocbot.min.js', function() {
    var toc = jQuery('#toc');
    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    function isExpandAllEnabled() {
      return CONFIG.toc && CONFIG.toc.expand_all === true;
    }
    function expandAllToc() {
      if (!isExpandAllEnabled()) { return; }
      jQuery('#toc-body .tocbot-is-collapsed').removeClass('tocbot-is-collapsed');
    }
    function updateTocToggle($li, $childList) {
      var $toggle = $li.children('.toc-toggle');
      if ($toggle.length === 0) { return; }
      var collapsed = $childList.hasClass('tocbot-is-collapsed');
      $toggle
        .toggleClass('toc-toggle-collapsed', collapsed)
        .toggleClass('toc-toggle-expanded', !collapsed);
    }
    function bindTocToggle() {
      if (!isExpandAllEnabled()) { return; }
      jQuery('#toc-body .toc-list-item').each(function() {
        var $li = jQuery(this);
        var $childList = $li.children('ol');
        if ($childList.length === 0) {
          if ($li.children('.toc-toggle').length === 0) {
            $li.prepend('<span class="toc-toggle toc-toggle-placeholder" aria-hidden="true">›</span>');
          }
          return;
        }

        if ($li.children('.toc-toggle').length === 0) {
          $li.prepend('<span class="toc-toggle toc-toggle-expanded" aria-hidden="true">›</span>');
        }
        updateTocToggle($li, $childList);
      });
      jQuery('#toc-body').off('click.tocToggle').on('click.tocToggle', '.toc-toggle', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var $li = jQuery(this).parent('.toc-list-item');
        var $childList = $li.children('ol');
        if ($childList.length === 0) { return; }
        $childList.toggleClass('tocbot-is-collapsed');
        updateTocToggle($li, $childList);
      });
      if (!window.__tocToggleObserver) {
        window.__tocToggleObserver = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type !== 'attributes' || mutation.attributeName !== 'class') { return; }
            var $list = jQuery(mutation.target);
            var $li = $list.parent('.toc-list-item');
            if ($li.length === 0) { return; }
            updateTocToggle($li, $list);
          });
        });
        jQuery('#toc-body ol').each(function() {
          window.__tocToggleObserver.observe(this, { attributes: true });
        });
      }
    }
    var tocConfig = Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc);
    if (isExpandAllEnabled()) {
      tocConfig.collapseDepth = 6;
    }
    window.tocbot.init(tocConfig);
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }
    expandAllToc();
    bindTocToggle();

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
        expandAllToc();
        bindTocToggle();
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/5.0.0/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
